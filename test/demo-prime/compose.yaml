---
services:
  prime:
    profiles: [ "prime" ]
    image: smalswebtech/base-php:apache
    env_file:
      - ../.env
    depends_on:
      init-shared-var-permissions:
        condition: service_completed_successfully
    environment:
      - PHP_FPM_MAX_CHILDREN=${BATS_PHP_FPM_MAX_CHILDREN}
      - PHP_FPM_REQUEST_MAX_MEMORY_IN_MEGABYTES=${BATS_PHP_FPM_REQUEST_MAX_MEMORY_IN_MEGABYTES}
      - CONTAINER_HEAP_PERCENT=${BATS_CONTAINER_HEAP_PERCENT}
    volumes:
      - ./bin/container-entrypoint.d:/opt/bin/container-entrypoint.d:ro
      - shared-log:/var/log/shared:rw
      - shared-var-prime:/app/var:rw
    tmpfs:
      - /opt/sbin:rw,exec,size=8m,mode=1777
      - /opt/etc:rw,noexec,size=8m,mode=1777
      - /app/tmp:rw,noexec,size=64m,mode=1777
    labels:
      - traefik.enable=true
      - traefik.http.routers.apache.rule=HostRegexp(`^(prime\-nocache\.localhost)$$`)
      - traefik.http.routers.apache.entrypoints=web
      - traefik.http.routers.apache.service=apache
      - traefik.http.services.apache.loadbalancer.server.port=9000
      - prometheus-scrape=false
      - prometheus.labels.pod=prime
    mem_limit: 512m
    read_only: true

  prime-php-exporter:
    profiles: [ "prime" ]
    image: docker.io/hipages/php-fpm_exporter:2.2.0
    env_file:
      - ../.env
    depends_on:
      prime:
        condition: service_healthy
    environment:
      - PHP_FPM_SCRAPE_URI=unix:///app/var/run/php-fpm/php-fpm.sock;/status
      - PHP_FPM_FIX_PROCESS_COUNT=1
      - GOMAXPROCS=1
    volumes:
      - shared-var-prime:/app/var:rw
    labels:
      - prometheus-scrape=true
      - prometheus-job=php-fpm
      - prometheus-port=9253
      - prometheus.labels.pod=prime
    mem_limit: 64m
    read_only: true

  prime-apache-exporter:
    profiles: [ "prime" ]
    image: docker.io/lusotycoon/apache-exporter:v1.0.12
    env_file:
      - ../.env
    command:
      - "--scrape_uri=http://prime:9000/server-status/?auto"
      - "--host_override=default.localhost"     
    depends_on:
      prime:
        condition: service_healthy
    labels:
      - prometheus-scrape=true
      - prometheus-job=apache
      - prometheus-port=9117
      - prometheus.labels.pod=prime
    mem_limit: 64m
    read_only: true

  prime-varnish:
    profiles: [ "prime" ]
    image: docker.io/varnish:8.0.1-alpine
    env_file:
      - ../.env
    command:
      - "varnishd"
      - "-F"
      - "-a"
      - "0.0.0.0:6081"
      - "-t"
      - "120"
      - "-f"
      - "/etc/varnish/default.vcl"
      - "-n"
      - "/var/lib/varnish/varnishd"
      - "-P"
      - "/var/lib/varnish/varnishd.pid"
      - "-s"
      - "file,/var/lib/varnish/storage.bin,400m"
    volumes:
      - shared-var-varnish:/var/lib/varnish:rw
      - ./etc/varnish/my-vcl-test-file.vcl:/etc/varnish/default.vcl:ro
    depends_on:
      prime:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.varnish.rule=HostRegexp(`^(prime\.localhost)$$`)
      - traefik.http.routers.varnish.entrypoints=web,websecure
      - traefik.http.routers.varnish.service=varnish
      - traefik.http.services.varnish.loadbalancer.server.port=6081
      - prometheus-scrape=false
      - prometheus.labels.pod=prime-varnish
    mem_limit: 512m
    read_only: true
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -S -q -O /dev/null http://127.0.0.1:6081/varnish-health 2>&1 | grep -q \"HTTP/1.1 200\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  prime-varnish-logs:
    profiles: [ "prime" ]
    image: docker.io/varnish:8.0.1-alpine
    env_file:
      - ../.env
    command:
      - varnishncsa
      - -n
      - /var/lib/varnish/varnishd
      - '-F %h %l %u %t \"%r\" %s %b \"%{X-Forwarded-For}i\" \"%{X-Forwarded-Proto}i\" \"%{X-Forwarded-Port}i\" \"%{User-agent}i\"'
    volumes:
      - shared-var-varnish:/var/lib/varnish:rw
    depends_on:
      prime-varnish:
        condition: service_healthy
    labels:
      - prometheus-scrape=false
      - prometheus.labels.pod=prime
    mem_limit: 32m
    read_only: true

  prime-varnish-exporter:
    profiles: [ "prime" ]
    image: ghcr.io/otto-de/prometheus-varnish-exporter:1.8.1-varnish-8.0.0
    env_file:
      - ../.env
    environment:
      - GOMAXPROCS=1
    volumes:
      - shared-var-varnish:/var/lib/varnish:rw
    depends_on:
      prime-varnish:
        condition: service_healthy
    labels:
      - prometheus-scrape=true
      - prometheus-job=varnish
      - prometheus-port=9131
      - prometheus.labels.pod=prime
    mem_limit: 32m
    read_only: true

volumes:
  shared-log:
  shared-var-prime:
  shared-var-varnish:

networks:
    default:
        name: ${CONTAINER_NETWORK_NAME}
